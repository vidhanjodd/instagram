<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Instagram · Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Grand+Hotel&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #000;
            --surface: #0a0a0a;
            --border: #2a2a2a;
            --text: #f5f5f5;
            --muted: #a0a0a0;
            --accent: #e1306c;
            --accent2: #833ab4;
            --accent3: #fd1d1d;
            --btn: linear-gradient(45deg, #833ab4, #fd1d1d, #fcb045);
            --input-bg: #121212;
        }

        body {
            background: var(--bg);
            font-family: 'DM Sans', sans-serif;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at 20% 50%, rgba(131,58,180,0.08) 0%, transparent 60%),
            radial-gradient(ellipse at 80% 20%, rgba(253,29,29,0.06) 0%, transparent 50%),
            radial-gradient(ellipse at 60% 80%, rgba(252,176,69,0.05) 0%, transparent 50%);
            pointer-events: none;
        }

        .wrapper {
            width: 100%;
            max-width: 350px;
            animation: fadeUp 0.6s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 40px 40px 32px;
            margin-bottom: 10px;
        }

        .logo {
            font-family: 'Grand Hotel', cursive;
            font-size: 42px;
            text-align: center;
            margin-bottom: 28px;
            background: linear-gradient(45deg, #833ab4, #fd1d1d, #fcb045);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1px;
        }

        .alert {
            background: rgba(225,48,108,0.12);
            border: 1px solid rgba(225,48,108,0.3);
            border-radius: 4px;
            padding: 10px 14px;
            font-size: 13px;
            color: #e1306c;
            margin-bottom: 16px;
            text-align: center;
        }

        .alert.success {
            background: rgba(52,211,153,0.1);
            border-color: rgba(52,211,153,0.3);
            color: #34d399;
        }

        .field {
            position: relative;
            margin-bottom: 6px;
        }

        .field input {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 3px;
            padding: 14px 12px 6px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
        }

        .field input:focus {
            border-color: #555;
        }

        .field label {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 13px;
            color: var(--muted);
            pointer-events: none;
            transition: all 0.15s ease;
        }

        .field input:focus ~ label,
        .field input:not(:placeholder-shown) ~ label {
            top: 8px;
            transform: none;
            font-size: 10px;
            color: #888;
        }

        .field input::placeholder { color: transparent; }

        .btn-login {
            width: 100%;
            padding: 8px;
            margin-top: 10px;
            background: var(--btn);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            letter-spacing: 0.3px;
        }

        .btn-login:hover { opacity: 0.88; }
        .btn-login:active { transform: scale(0.98); }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .divider span {
            font-size: 12px;
            font-weight: 600;
            color: var(--muted);
            letter-spacing: 1px;
        }

        .forgot {
            display: block;
            text-align: center;
            font-size: 12px;
            color: #a0c4ff;
            text-decoration: none;
            margin-top: 14px;
        }

        .forgot:hover { text-decoration: underline; }

        .register-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 20px;
            text-align: center;
            font-size: 14px;
            color: var(--muted);
        }

        .register-card a {
            color: #4fa3e8;
            font-weight: 600;
            text-decoration: none;
        }

        .register-card a:hover { text-decoration: underline; }

        .app-links {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: var(--muted);
        }

        .app-links p { margin-bottom: 12px; }

        .app-badges {
            display: flex;
            justify-content: center;
            gap: 8px;
        }

        .badge {
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 6px 14px;
            font-size: 12px;
            color: var(--text);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: border-color 0.2s;
        }

        .badge:hover { border-color: #555; }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="card">
        <div class="logo">Instagram</div>

        <div th:if="${param.error}" class="alert">
            Your username or password is incorrect.
        </div>
        <div th:if="${param.logout}" class="alert success">
            You've been logged out successfully.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="field">
                <input type="text" id="username" name="username" placeholder="username" required/>
                <label for="username">Phone number, username, or email</label>
            </div>
            <div class="field">
                <input type="password" id="password" name="password" placeholder="password" required/>
                <label for="password">Password</label>
            </div>
            <button type="submit" class="btn-login">Log in</button>
        </form>

        <div class="divider"><span>OR</span></div>

        <a href="#" class="forgot">Forgot password?</a>
    </div>

    <div class="register-card">
        Don't have an account? <a th:href="@{/users/register}">Sign up</a>
    </div>

    <div class="app-links">
        <p>Get the app.</p>
        <div class="app-badges">
            <a href="#" class="badge">📱 App Store</a>
            <a href="#" class="badge">🤖 Google Play</a>
        </div>
    </div>
</div>
</body>
</html>
