<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />
    <title>Instagram</title>
    <link href="https://fonts.googleapis.com/css2?family=Grand+Hotel&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/feed.css}"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>

<nav>
    <a class="nav-logo" th:href="@{/posts}">Instagram</a>

    <div class="search-wrap" id="searchWrap">
        <div class="search-box">
            <i class="fa-solid fa-magnifying-glass search-icon"></i>
            <input type="text" id="searchInput" placeholder="Search" autocomplete="off"/>
        </div>
        <div class="search-dropdown" id="searchDropdown"></div>
    </div>

    <div class="nav-icons" style="display: flex; align-items: center; gap: 20px; font-size: 24px;">
        <a th:href="@{/posts}" title="Home" style="color: inherit; text-decoration: none;">
            <i class="fa-solid fa-house"></i>
        </a>
        <a th:href="@{/posts/create}" title="New Post" style="color: inherit; text-decoration: none;">
            <i class="fa-regular fa-square-plus"></i>
        </a>
        <a th:href="@{/users/{id}/profile(id=${currentUser.id})}" title="Profile" style="color: inherit; text-decoration: none;">
            <i class="fa-regular fa-circle-user"></i>
        </a>
        <form th:action="@{/logout}" method="post" style="display:inline; margin: 0;">
            <button type="submit" title="Logout" style="background: none; border: none; padding: 0; cursor: pointer; color: inherit; font-size: 24px;">
                <i class="fa-solid fa-arrow-right-from-bracket"></i>
            </button>
        </form>
    </div>
</nav>

<div class="layout">
    <main>

        <div class="post-card" th:each="post : ${posts}">

            <div class="post-header">
                <a class="post-user" th:href="@{/users/{id}/profile(id=${post.user.id})}">
                    <div class="post-avatar">
                        <div class="post-avatar-inner"
                             th:text="${#strings.substring(post.user.username, 0, 1).toUpperCase()}">A</div>
                    </div>
                    <div class="post-username" th:text="${post.user.username}">username</div>
                </a>

                <!-- 3-dot menu: only for post owner -->
                <div class="post-options-wrap" th:if="${post.user.id == currentUser.id}">
                    <button class="post-more" th:attr="data-post-id=${post.id}, data-caption=${post.caption}"
                            onclick="toggleFeedDropdown(this)" title="Options">&#8942;</button>
                    <div class="feed-dropdown">
                        <button class="feed-dropdown-item feed-edit-btn"
                                th:attr="data-post-id=${post.id}, data-caption=${post.caption}">
                            <i class="fa-regular fa-pen-to-square"></i> Edit Caption
                        </button>
                        <button class="feed-dropdown-item feed-delete-btn"
                                th:attr="data-post-id=${post.id}">
                            <i class="fa-regular fa-trash-can"></i> Delete Post
                        </button>
                    </div>
                </div>
            </div>

            <img th:if="${post.mediaType == 'IMAGE'}"
                 class="post-media"
                 th:src="${post.mediaUrl}"
                 th:alt="${post.caption}"/>
            <video th:if="${post.mediaType == 'VIDEO'}"
                   class="post-media"
                   th:src="${post.mediaUrl}"
                   controls></video>

            <div class="post-actions">
                <button class="action-btn like-btn"
                        th:attr="data-post-id=${post.id},
                                 data-liked=${post.likes != null and post.likes.![user.id].contains(currentUser.id)}"
                        style="background: none; border: none; padding: 0; cursor: pointer; margin-right: 12px;"
                        title="Like">
                    <i class="fa-heart like-icon"
                       th:classappend="${post.likes != null and post.likes.![user.id].contains(currentUser.id)} ? 'fa-solid' : 'fa-regular'"
                       style="font-size: 24px;"></i>
                </button>

                <a class="action-btn"
                   th:href="@{/posts/{postId}(postId=${post.id})}"
                   title="Comment" style="margin-right: 12px; color: inherit;">
                    <i class="fa-regular fa-comment" style="font-size: 24px;"></i>
                </a>

                <button class="action-btn" title="Share" style="background: none; border: none; padding: 0; cursor: pointer; color: inherit;">
                    <i class="fa-regular fa-paper-plane" style="font-size: 24px;"></i>
                </button>
            </div>

            <div class="likes-count">
                <span th:id="'like-count-' + ${post.id}"
                      th:text="${post.likes.size()} + ' ' + (${post.likes.size()} == 1 ? 'like' : 'likes')">
                </span>
            </div>

            <div class="post-caption">
                <span class="cap-username" th:text="${post.user.username}">username</span>
                <span th:text="${post.caption}">Caption here</span>
            </div>

            <a class="view-comments"
               th:if="${not #lists.isEmpty(post.comments)}"
               th:href="@{/posts/{postId}(postId=${post.id})}"
               th:text="'View all ' + ${#lists.size(post.comments)} + ' comment' + (${#lists.size(post.comments) > 1} ? 's' : '')">
                View all comments
            </a>

            <div class="post-time" th:text="${post.createdAt}">2 hours ago</div>

            <form class="post-comment-bar" th:action="@{/comments/add}" method="POST">
                <span style="font-size:18px">&#128512;</span>
                <input type="hidden" name="postId" th:value="${post.id}"/>
                <input type="hidden" name="userId" th:value="${currentUser.id}"/>
                <input class="comment-input"
                       type="text"
                       name="content"
                       placeholder="Add a comment?"
                       autocomplete="off"/>
                <button type="submit" class="post-btn">Post</button>
            </form>

        </div>

    </main>
</div>

<!-- ── Delete Confirmation Modal ──────────────────────────────── -->
<div class="modal-overlay" id="deleteModal">
    <div class="modal-box">
        <div class="modal-title">Delete post?</div>
        <div class="modal-subtitle">Are you sure you want to delete this post?</div>
        <form id="deleteForm" method="post">
            <button type="submit" class="modal-btn delete">Delete</button>
        </form>
        <button class="modal-btn cancel" onclick="closeDeleteModal()">Cancel</button>
    </div>
</div>

<!-- ── Edit Caption Modal ──────────────────────────────────────── -->
<div class="modal-overlay" id="editModal">
    <div class="modal-box">
        <div class="modal-title">Edit Caption</div>
        <div style="padding: 12px 16px 16px;">
            <textarea id="editCaptionInput" rows="4"
                      style="width:100%;box-sizing:border-box;border:1px solid #dbdbdb;border-radius:8px;
                       padding:10px;font-size:14px;resize:none;font-family:'DM Sans',sans-serif;
                       outline:none;color:#262626;"></textarea>
        </div>
        <button class="modal-btn" id="saveEditBtn"
                style="color:#0095f6; font-weight:700; border-top: 1px solid #efefef;">Save</button>
        <button class="modal-btn cancel" onclick="closeEditModal()">Cancel</button>
    </div>
</div>

<script>
    /* ── Helpers ────────────────────────────────────────────────── */
    function getCsrfToken() {
        return document.querySelector('meta[name="_csrf"]').getAttribute('content');
    }
    function getCsrfHeader() {
        return document.querySelector('meta[name="_csrf_header"]').getAttribute('content');
    }

    /* ── 3-dot dropdown ─────────────────────────────────────────── */
    function toggleFeedDropdown(btn) {
        // Close any other open dropdown first
        document.querySelectorAll('.feed-dropdown.open').forEach(function (d) {
            if (d !== btn.nextElementSibling) d.classList.remove('open');
        });
        btn.nextElementSibling.classList.toggle('open');
    }

    // Close dropdowns on outside click
    document.addEventListener('click', function (e) {
        if (!e.target.closest('.post-options-wrap')) {
            document.querySelectorAll('.feed-dropdown.open').forEach(function (d) {
                d.classList.remove('open');
            });
        }
    });

    /* ── Wire up Edit & Delete buttons after DOM ready ──────────── */
    document.addEventListener('DOMContentLoaded', function () {

        // Edit buttons
        document.querySelectorAll('.feed-edit-btn').forEach(function (btn) {
            btn.addEventListener('click', function () {
                document.querySelectorAll('.feed-dropdown.open').forEach(d => d.classList.remove('open'));
                openEditModal(this.dataset.postId, this.dataset.caption || '');
            });
        });

        // Delete buttons
        document.querySelectorAll('.feed-delete-btn').forEach(function (btn) {
            btn.addEventListener('click', function () {
                document.querySelectorAll('.feed-dropdown.open').forEach(d => d.classList.remove('open'));
                openDeleteModal(this.dataset.postId);
            });
        });

        /* ── Like buttons ─────────────────────────────────────────── */
        document.querySelectorAll('.like-btn').forEach(function (btn) {
            const icon = btn.querySelector('.like-icon');
            if (btn.dataset.liked === 'true') {
                icon.classList.remove('fa-regular');
                icon.classList.add('fa-solid');
                icon.style.color = '#ff3040';
            }

            btn.addEventListener('click', function () {
                const postId = this.dataset.postId;
                fetch('/posts/' + postId + '/like', {
                    method: 'POST',
                    headers: { [getCsrfHeader()]: getCsrfToken() }
                })
                    .then(res => res.json())
                    .then(data => {
                        if (data.liked) {
                            icon.classList.remove('fa-regular');
                            icon.classList.add('fa-solid');
                            icon.style.color = '#ff3040';
                        } else {
                            icon.classList.remove('fa-solid');
                            icon.classList.add('fa-regular');
                            icon.style.color = '';
                        }
                        const countEl = document.getElementById('like-count-' + postId);
                        if (countEl) {
                            countEl.textContent = data.likeCount + ' ' + (data.likeCount === 1 ? 'like' : 'likes');
                        }
                    })
                    .catch(() => console.error('Like failed'));
            });
        });

        /* ── Search ───────────────────────────────────────────────── */
        const input    = document.getElementById('searchInput');
        const dropdown = document.getElementById('searchDropdown');
        if (!input || !dropdown) return;

        let debounceTimer;
        input.addEventListener('input', function () {
            const query = this.value.trim();
            clearTimeout(debounceTimer);
            dropdown.innerHTML = '';
            if (query.length === 0) { dropdown.classList.remove('open'); return; }

            debounceTimer = setTimeout(() => {
                fetch('/users/search?query=' + encodeURIComponent(query), {
                    headers: { 'X-Requested-With': 'XMLHttpRequest' }
                })
                    .then(res => res.json())
                    .then(users => {
                        dropdown.innerHTML = '';
                        if (users.length === 0) {
                            dropdown.innerHTML = '<div class="search-no-results">No users found</div>';
                        } else {
                            users.forEach(user => {
                                const initial = user.username.charAt(0).toUpperCase();
                                const item = document.createElement('a');
                                item.href = '/users/' + user.id + '/profile';
                                item.className = 'search-result-item';
                                item.innerHTML = `
                                <div class="search-result-avatar">
                                    <div class="search-result-avatar-inner">${initial}</div>
                                </div>
                                <div>
                                    <div class="search-result-username">${escapeHtml(user.username)}</div>
                                </div>`;
                                dropdown.appendChild(item);
                            });
                        }
                        dropdown.classList.add('open');
                    })
                    .catch(() => {});
            }, 300);
        });

        document.addEventListener('click', function (e) {
            if (!document.getElementById('searchWrap').contains(e.target)) {
                dropdown.classList.remove('open');
            }
        });

        input.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') { dropdown.classList.remove('open'); input.blur(); }
        });
    });

    /* ── Delete Modal ───────────────────────────────────────────── */
    function openDeleteModal(postId) {
        const form = document.getElementById('deleteForm');
        form.action = '/posts/' + postId + '/delete';

        const old = form.querySelector('input[name="_csrf"]');
        if (old) old.remove();
        const csrfInput = document.createElement('input');
        csrfInput.type  = 'hidden';
        csrfInput.name  = '_csrf';
        csrfInput.value = getCsrfToken();
        form.appendChild(csrfInput);

        document.getElementById('deleteModal').classList.add('active');
    }

    function closeDeleteModal() {
        document.getElementById('deleteModal').classList.remove('active');
    }

    document.getElementById('deleteModal').addEventListener('click', function (e) {
        if (e.target === this) closeDeleteModal();
    });

    /* ── Edit Modal ─────────────────────────────────────────────── */
    let currentEditPostId = null;

    function openEditModal(postId, caption) {
        currentEditPostId = postId;
        document.getElementById('editCaptionInput').value = caption;
        document.getElementById('editModal').classList.add('active');
        document.getElementById('editCaptionInput').focus();
    }

    function closeEditModal() {
        document.getElementById('editModal').classList.remove('active');
        currentEditPostId = null;
    }

    document.getElementById('editModal').addEventListener('click', function (e) {
        if (e.target === this) closeEditModal();
    });

    document.getElementById('saveEditBtn').addEventListener('click', function () {
        if (!currentEditPostId) return;
        const newCaption = document.getElementById('editCaptionInput').value.trim();
        const btn = this;
        btn.textContent = 'Saving…';
        btn.disabled = true;

        fetch('/posts/' + currentEditPostId + '/edit', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                [getCsrfHeader()]: getCsrfToken()
            },
            body: JSON.stringify({ caption: newCaption })
        })
            .then(function (res) {
                if (res.ok) {
                    // Update caption text live on the card
                    document.querySelectorAll('.feed-edit-btn').forEach(function (b) {
                        if (b.dataset.postId === currentEditPostId) {
                            b.dataset.caption = newCaption;
                            // update caption span on the card
                            const card = b.closest('.post-card');
                            if (card) {
                                const capSpan = card.querySelector('.post-caption span:last-child');
                                if (capSpan) capSpan.textContent = newCaption;
                            }
                        }
                    });
                    closeEditModal();
                } else {
                    alert('Could not update caption. Please try again.');
                }
            })
            .catch(function () { alert('Network error. Please try again.'); })
            .finally(function () {
                btn.textContent = 'Save';
                btn.disabled = false;
            });
    });

    function escapeHtml(str) {
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
</script>
</body>
</html>
