<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Instagram</title>
    <link href="https://fonts.googleapis.com/css2?family=Grand+Hotel&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/feed.css}"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>

<nav>
    <a class="nav-logo" th:href="@{/posts}">Instagram</a>
    <div class="nav-icons">
        <a th:href="@{/posts}" title="Home">⌂</a>
        <a th:href="@{/posts/create}" title="New Post">+</a>
        <a th:href="@{/users/{id}/profile(id=${currentUser.id})}" title="Profile">☺</a>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <button type="submit" title="Logout">✕</button>
        </form>
    </div>
</nav>

<div class="layout">
    <main>

        <div th:if="${#lists.isEmpty(posts)}" style="text-align:center; padding: 60px 20px; color: #8e8e8e;">
            <h3 style="margin-bottom:8px; color:#f5f5f5;">No Posts Yet</h3>
            <p style="margin-bottom:20px;">Be the first to share something.</p>
            <a th:href="@{/posts/create}" class="create-btn">+ Create Post</a>
        </div>

        <div class="post-card" th:each="post : ${posts}">

            <!-- Post header: author avatar + username -->
            <div class="post-header">
                <a class="post-user" th:href="@{/users/{id}/profile(id=${post.user.id})}">
                    <div class="post-avatar">
                        <div class="post-avatar-inner"
                             th:text="${#strings.substring(post.user.username, 0, 1).toUpperCase()}">A</div>
                    </div>
                    <div class="post-username" th:text="${post.user.username}">username</div>
                </a>
                <button class="post-more">•••</button>
            </div>

            <!-- Media -->
            <img th:if="${post.mediaType == 'IMAGE'}"
                 class="post-media"
                 th:src="${post.mediaUrl}"
                 th:alt="${post.caption}"/>
            <video th:if="${post.mediaType == 'VIDEO'}"
                   class="post-media"
                   th:src="${post.mediaUrl}"
                   controls></video>

            <!-- Action buttons -->
            <div class="post-actions">
                <button class="action-btn" title="Like">
                    <i class="fa-regular fa-heart"></i>
                </button>

                <!--
                    COMMENT ICON:
                    Clicking the 💬 icon navigates to /posts/{postId} which renders
                    post-details.html — the Instagram-style popup with the comment panel.

                    This is the same behavior as Instagram web: clicking the comment
                    icon or the post itself opens the full post + comments view.
                -->
                <a class="action-btn"
                   th:href="@{/posts/{postId}(postId=${post.id})}"
                   title="Comment"><i class="fa-regular fa-comment"></i></a>

                <button class="action-btn" title="Share">
                    <i class="fa-regular fa-paper-plane"></i>
                </button>
            </div>

            <!-- Caption -->
            <div class="post-caption">
                <span class="cap-username" th:text="${post.user.username}">username</span>
                <span th:text="${post.caption}">Caption here</span>
            </div>

            <!--
                "View all X comments" link — like Instagram on the feed.
                This also navigates to the post-details page where comments are visible.
                We show it only if the post has at least 1 comment.
            -->
            <a class="view-comments"
               th:if="${not #lists.isEmpty(post.comments)}"
               th:href="@{/posts/{postId}(postId=${post.id})}"
               th:text="'View all ' + ${#lists.size(post.comments)} + ' comment' + (${#lists.size(post.comments) > 1} ? 's' : '')">
                View all comments
            </a>

            <div class="post-time" th:text="${post.createdAt}">2 hours ago</div>

            <!--
                Quick comment bar on the feed card (same as Instagram).
                Submitting here adds a comment and redirects back to the feed.
                The CommentController handles this at POST /comments/add.
            -->
            <form class="post-comment-bar" th:action="@{/comments/add}" method="POST">
                <span style="font-size:18px">☺</span>
                <input type="hidden" name="postId" th:value="${post.id}"/>
                <input type="hidden" name="userId" th:value="${currentUser.id}"/>
                <!-- parentId is not sent — this is always a top-level comment from the feed -->
                <input class="comment-input"
                       type="text"
                       name="content"
                       placeholder="Add a comment…"
                       autocomplete="off"/>
                <button type="submit" class="post-btn">Post</button>
            </form>

        </div>

    </main>
</div>

</body>
</html>
