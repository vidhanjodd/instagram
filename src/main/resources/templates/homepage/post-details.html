<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${post.user.username} + ' • Instagram'">Post • Instagram</title>
    <link href="https://fonts.googleapis.com/css2?family=Grand+Hotel&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/post-details.css}"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />
</head>
<body>

<div class="page-overlay">
    <div class="post-card">

        <!-- ── LEFT: Media ──────────────────────────────────── -->
        <div class="post-left">
            <img th:if="${post.mediaType == 'IMAGE'}"
                 class="post-media"
                 th:src="${post.mediaUrl}"
                 th:alt="${post.caption}"/>
            <video th:if="${post.mediaType == 'VIDEO'}"
                   class="post-media"
                   th:src="${post.mediaUrl}"
                   controls></video>
        </div>

        <!-- ── RIGHT: Header + Scroll + Footer ─────────────── -->
        <div class="post-right">

            <!-- HEADER -->
            <div class="panel-header">

                <div class="caption-row" th:if="${post.caption != null and !#strings.isEmpty(post.caption)}">
                    <div class="small-avatar"
                         th:text="${#strings.substring(post.user.username, 0, 1).toUpperCase()}">A</div>
                    <div class="comment-body">
                        <div class="comment-text">
                            <strong th:text="${post.user.username}">username</strong>
                            <span class="caption-text-span" th:text="${post.caption}">Caption here</span>
                        </div>
                        <div class="comment-meta">
                            <span class="comment-time"
                                  th:text="${#temporals.format(post.createdAt, 'MMM d')}">Jan 1</span>
                        </div>
                    </div>
                </div>
                <!-- 3-dot: owner only -->
                <div class="post-options-wrapper" th:if="${post.user.id == currentUser.id}">
                    <button class="dots-btn" id="dotsBtn">&#8942;</button>
                    <div class="options-dropdown" id="optionsDropdown">
                        <button class="option-item option-edit" id="editPostBtn">
                            <i class="fa-regular fa-pen-to-square"></i> Edit Caption
                        </button>
                        <button class="option-item option-delete" id="deletePostBtn">
                            <i class="fa-regular fa-trash-can"></i> Delete Post
                        </button>
                    </div>
                </div>
            </div>

            <!-- SCROLLABLE COMMENTS AREA -->
            <div class="comments-scroll" id="commentsScroll">


                <!-- No comments -->
                <div th:if="${#lists.isEmpty(comments)}" class="no-comments">
                    <p class="no-comments-title">No comments yet.</p>
                    <p class="no-comments-sub">Start the conversation.</p>
                </div>

                <!-- Comments -->
                <div id="commentsList" th:attr="data-current-user-id=${currentUser.id}">
                    <div class="comment-item"
                         th:each="comment : ${comments}"
                         th:id="'comment-' + ${comment.id}"
                         th:attr="data-comment-id=${comment.id}, data-user-id=${comment.userId}, data-reply-count=${comment.replyCount}">

                        <div class="small-avatar"
                             th:text="${#strings.substring(comment.username, 0, 1).toUpperCase()}">A</div>

                        <div class="comment-body">
                            <div class="comment-text">
                                <strong th:text="${comment.username}">user</strong>
                                <span th:text="${comment.content}">comment text</span>
                            </div>
                            <div class="comment-meta">
                                <span class="comment-time"
                                      th:text="${#temporals.format(comment.createdAt, 'MMM d')}">Jan 1</span>
                                <button class="reply-btn"
                                        th:attr="data-comment-id=${comment.id}, data-username=${comment.username}">
                                    Reply
                                </button>
                                <button class="delete-btn"
                                        th:attr="data-comment-id=${comment.id}">
                                    Delete
                                </button>
                            </div>
                            <button class="view-replies-btn"
                                    th:if="${comment.replyCount > 0}"
                                    th:attr="data-comment-id=${comment.id}, data-reply-count=${comment.replyCount}">
                                View <span th:text="${comment.replyCount}">0</span> replies
                            </button>
                            <div class="replies-list"
                                 th:id="'replies-' + ${comment.id}"
                                 style="display:none;"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- FOOTER -->
            <div class="panel-footer">

                <!-- Action icons -->
                <div class="post-actions">
                    <form id="likeForm" th:action="@{/posts/{postId}/like(postId=${post.id})}" method="post">
                        <button type="submit" class="action-btn" title="Like">
                            <span th:with="isLiked=${post.likes != null and post.likes.![user.id].contains(currentUser.id)}">
                                <i id="likeIcon"
                                   th:class="${isLiked ? 'fa-solid fa-heart' : 'fa-regular fa-heart'}"
                                   th:style="${isLiked ? 'color:#ff3040;' : ''}"></i>
                            </span>
                        </button>
                    </form>
                    <button class="action-btn" title="Comment"
                            onclick="document.getElementById('commentInput').focus()">
                        <i class="fa-regular fa-comment"></i>
                    </button>
                    <button class="action-btn" title="Share">
                        <i class="fa-regular fa-paper-plane"></i>
                    </button>
                </div>

                <!-- Like count -->
                <div class="like-count" id="likeCountDisplay"
                     th:text="${post.likes != null and #lists.size(post.likes) > 0
                               ? #lists.size(post.likes) + ' likes' : ''}"></div>

                <!-- Date -->
                <div class="post-time"
                     th:text="${#temporals.format(post.createdAt, 'MMMM d, yyyy')}">January 1, 2024</div>

                <!-- Reply indicator (hidden by default) -->
                <div id="reply-info">
                    <span>Replying to <span id="reply-username-label">@user</span></span>
                    <button id="cancel-reply-btn">✕</button>
                </div>

                <!-- Comment input -->
                <form class="comment-form" th:action="@{/comments/add}" method="POST" id="commentForm">
                    <input type="hidden" name="postId" th:value="${post.id}"/>
                    <input type="hidden" name="userId" th:value="${currentUser.id}"/>
                    <input type="hidden" name="parentId" id="parentIdField" value=""/>
                    <input type="hidden" name="replyingToUsername" id="replyingToUsername"/>
                    <input class="comment-input" id="commentInput" type="text"
                           name="content" placeholder="Add a comment…" autocomplete="off"/>
                    <button type="submit" class="submit-btn" id="submitBtn" disabled>Post</button>
                </form>
            </div>

        </div>
    </div>
</div>

<!-- Edit Caption Modal -->
<div id="editModal" class="modal-backdrop">
    <div class="modal-box" onclick="event.stopPropagation()">
        <div class="modal-header">
            <h3>Edit Caption</h3>
            <button class="modal-close-btn" id="modalCloseBtn">&#x2715;</button>
        </div>
        <textarea id="editCaptionInput" rows="4" placeholder="Write a caption…"></textarea>
        <div class="modal-actions">
            <button id="cancelEditBtn" class="modal-btn modal-cancel">Cancel</button>
            <button id="saveEditBtn" class="modal-btn modal-save">Save</button>
        </div>
    </div>
</div>

<script th:inline="javascript">
    const currentUserId = [[${currentUser.id}]];
    const postId        = [[${post.id}]];
    let   postCaption   = [[${post.caption}]] || '';

    function getCsrfToken() {
        return document.querySelector('meta[name="_csrf"]').getAttribute('content');
    }
    function escapeHtml(str) {
        const d = document.createElement('div');
        d.textContent = str || '';
        return d.innerHTML;
    }
    function formatDate(iso) {
        if (!iso) return '';
        try { return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }); }
        catch(e) { return ''; }
    }

    document.addEventListener('DOMContentLoaded', function () {
        initComments();

        document.getElementById('commentInput').addEventListener('input', function () {
            document.getElementById('submitBtn').disabled = !this.value.trim();
        });

        // Like AJAX
        const likeForm = document.getElementById('likeForm');
        if (likeForm) {
            likeForm.addEventListener('submit', function (e) {
                e.preventDefault();
                fetch(this.action, {
                    method: 'POST',
                    headers: { 'X-XSRF-TOKEN': getCsrfToken(), 'Accept': 'application/json' }
                })
                    .then(r => r.json())
                    .then(data => {
                        const icon = document.getElementById('likeIcon');
                        icon.className   = data.liked ? 'fa-solid fa-heart' : 'fa-regular fa-heart';
                        icon.style.color = data.liked ? '#ff3040' : '';
                        const el = document.getElementById('likeCountDisplay');
                        el.textContent = data.likeCount > 0
                            ? data.likeCount + (data.likeCount === 1 ? ' like' : ' likes') : '';
                    })
                    .catch(console.error);
            });
        }

        document.getElementById('cancel-reply-btn').addEventListener('click', cancelReply);

        // 3-dot menu
        const dotsBtn  = document.getElementById('dotsBtn');
        const dropdown = document.getElementById('optionsDropdown');
        if (dotsBtn) {
            dotsBtn.addEventListener('click', function (e) {
                e.stopPropagation();
                dropdown.classList.toggle('open');
            });
            document.addEventListener('click', () => dropdown.classList.remove('open'));
        }

        // Delete post
        const deletePostBtn = document.getElementById('deletePostBtn');
        if (deletePostBtn) {
            deletePostBtn.addEventListener('click', function () {
                dropdown.classList.remove('open');
                if (!confirm('Delete this post? This cannot be undone.')) return;
                fetch('/posts/' + postId + '/delete', {
                    method: 'POST', headers: { 'X-XSRF-TOKEN': getCsrfToken() }
                })
                    .then(res => { if (res.ok) window.location.href = '/posts'; else alert('Could not delete post.'); })
                    .catch(() => alert('Network error.'));
            });
        }

        // Edit caption
        const editPostBtn   = document.getElementById('editPostBtn');
        const editModal     = document.getElementById('editModal');
        const cancelEditBtn = document.getElementById('cancelEditBtn');
        const modalCloseBtn = document.getElementById('modalCloseBtn');
        const saveEditBtn   = document.getElementById('saveEditBtn');
        const editInput     = document.getElementById('editCaptionInput');

        function openEditModal() {
            dropdown.classList.remove('open');
            editInput.value = postCaption;
            editModal.classList.add('open');
            editInput.focus();
        }
        function closeEditModal() { editModal.classList.remove('open'); }

        if (editPostBtn)   editPostBtn.addEventListener('click', openEditModal);
        if (cancelEditBtn) cancelEditBtn.addEventListener('click', closeEditModal);
        if (modalCloseBtn) modalCloseBtn.addEventListener('click', closeEditModal);
        editModal.addEventListener('click', e => { if (e.target === editModal) closeEditModal(); });

        if (saveEditBtn) {
            saveEditBtn.addEventListener('click', function () {
                const newCaption = editInput.value.trim();
                this.textContent = 'Saving…';
                this.disabled    = true;
                fetch('/posts/' + postId + '/edit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-XSRF-TOKEN': getCsrfToken() },
                    body: JSON.stringify({ caption: newCaption })
                })
                    .then(res => {
                        if (res.ok) {
                            postCaption = newCaption;
                            const s = document.querySelector('.caption-text-span');
                            if (s) s.textContent = newCaption;
                            closeEditModal();
                        } else { alert('Could not update caption.'); }
                    })
                    .catch(() => alert('Network error.'))
                    .finally(() => { saveEditBtn.textContent = 'Save'; saveEditBtn.disabled = false; });
            });
        }
    });

    // Comments
    function initComments() {
        const list = document.getElementById('commentsList');
        if (!list) return;
        list.querySelectorAll('.comment-item').forEach(wireCommentItem);
    }

    function wireCommentItem(item) {
        const commentId = item.dataset.commentId;
        const userId    = parseInt(item.dataset.userId);

        const deleteBtn = item.querySelector('.delete-btn');
        if (deleteBtn && userId === currentUserId) {
            deleteBtn.classList.add('visible');
            deleteBtn.addEventListener('click', () => handleDelete(commentId, item));
        }
        item.querySelector('.reply-btn')?.addEventListener('click', function () {
            prepareReply(this.dataset.commentId, this.dataset.username);
        });
        item.querySelector('.view-replies-btn')?.addEventListener('click', function () {
            toggleReplies(this, commentId);
        });
    }

    function prepareReply(commentId, username) {
        let parentId = commentId;
        const el = document.querySelector('[data-comment-id="' + commentId + '"]');
        const pc = el.closest('.comment-item');
        if (pc?.closest('.replies-list')) {
            parentId = pc.closest('.replies-list').id.split('-')[1];
        }
        document.getElementById('parentIdField').value      = parentId;
        document.getElementById('replyingToUsername').value = username;
        document.getElementById('reply-username-label').textContent = '@' + username;
        document.getElementById('reply-info').classList.add('active');
        const input = document.getElementById('commentInput');
        input.placeholder = 'Reply to @' + username + '…';
        input.focus();
    }

    function cancelReply() {
        document.getElementById('parentIdField').value = '';
        document.getElementById('reply-info').classList.remove('active');
        const input = document.getElementById('commentInput');
        input.placeholder = 'Add a comment…';
        input.value = '';
        document.getElementById('submitBtn').disabled = true;
    }

    function toggleReplies(btn, parentId) {
        const container = document.getElementById('replies-' + parentId);
        if (!container) return;
        if (container.dataset.loaded === 'true') {
            const hidden = container.style.display === 'none';
            container.style.display = hidden ? 'block' : 'none';
            btn.innerHTML = hidden ? 'Hide replies' : 'View ' + btn.dataset.replyCount + ' replies';
            return;
        }
        btn.textContent = 'Loading…';
        fetch('/comments/replies/' + parentId)
            .then(r => r.json())
            .then(replies => {
                container.innerHTML = '';
                replies.forEach(reply => {
                    const el = buildReplyElement(reply);
                    container.appendChild(el);
                    wireCommentItem(el);
                });
                container.dataset.loaded = 'true';
                container.style.display  = 'block';
                btn.innerHTML = 'Hide replies';
            })
            .catch(() => { btn.textContent = 'View ' + btn.dataset.replyCount + ' replies'; });
    }

    function buildReplyElement(reply) {
        const initial = reply.username ? reply.username.charAt(0).toUpperCase() : '?';
        const isOwner = reply.userId === currentUserId;
        const item = document.createElement('div');
        item.className = 'comment-item';
        item.dataset.commentId  = reply.id;
        item.dataset.userId     = reply.userId;
        item.dataset.replyCount = 0;
        item.innerHTML = `
            <div class="small-avatar">${initial}</div>
            <div class="comment-body">
                <div class="comment-text">
                    <strong>${escapeHtml(reply.username)}</strong>
                    <span>${escapeHtml(reply.content)}</span>
                </div>
                <div class="comment-meta">
                    <span class="comment-time">${formatDate(reply.createdAt)}</span>
                    <button class="reply-btn" data-comment-id="${reply.id}" data-username="${escapeHtml(reply.username)}">Reply</button>
                    <button class="delete-btn ${isOwner ? 'visible' : ''}" data-comment-id="${reply.id}">Delete</button>
                </div>
            </div>`;
        return item;
    }

    function handleDelete(commentId, itemElement) {
        fetch('/comments/delete/' + commentId, {
            method: 'POST', headers: { 'X-XSRF-TOKEN': getCsrfToken() }
        })
            .then(res => {
                if (res.ok) {
                    itemElement.remove();
                    document.getElementById('replies-' + commentId)?.remove();
                    document.querySelector('[data-comment-id="' + commentId + '"].view-replies-btn')?.remove();
                    setTimeout(() => location.reload(), 300);
                } else { alert('Could not delete comment.'); }
            })
            .catch(() => alert('Network error.'));
    }
</script>

</body>
</html>
