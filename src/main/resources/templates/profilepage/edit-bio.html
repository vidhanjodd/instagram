<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Instagram · Edit Profile</title>
    <link rel="stylesheet" th:href="@{/css/edit-bio.css}"/>
    <link href="https://fonts.googleapis.com/css2?family=Grand+Hotel&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
</head>
<body>
<nav>
    <a class="nav-back" th:href="@{/users/{id}/profile(id=${user.id})}">←</a>
    <span class="nav-title">Edit profile</span>
    <button class="nav-save" form="editForm" type="submit">Done</button>
</nav>

<div class="page">
    <!-- Avatar -->
    <div class="avatar-section">
        <div class="avatar-ring">
            <div class="avatar-inner" th:text="${#strings.substring(user.username,0,1).toUpperCase()}">A</div>
        </div>
        <button class="change-photo-btn" type="button">Change profile photo</button>
    </div>

    <!-- Form -->
    <form id="editForm" th:action="@{/users/{id}/bio(id=${user.id})}" method="post" class="form-section">

        <div class="form-field">
            <label>Username</label>
            <input type="text" th:value="${user.username}" disabled style="color: var(--muted);"/>
        </div>

        <div class="form-field">
            <label>Email</label>
            <input type="email" th:value="${user.email}" disabled style="color: var(--muted);"/>
        </div>

        <div class="form-field">
            <label>Bio</label>
            <textarea name="bio" maxlength="150" placeholder="Write something about yourself…"
                      th:text="${user.bio}"
                      oninput="updateBioCount(this)"></textarea>
            <div class="bio-footer">
                <span class="bio-count" id="bioCount">0 / 150</span>
            </div>
        </div>

        <div class="private-toggle">
            <div>
                <div class="toggle-label">Private account</div>
                <div class="toggle-sub">Only approved followers can see your posts</div>
            </div>
            <div class="toggle-switch" th:classappend="${user.private ? 'on' : ''}"
                 onclick="this.classList.toggle('on')"></div>
        </div>

        <div class="submit-section">
            <button class="btn-submit" type="submit">Save changes</button>
        </div>
    </form>

    <div class="danger-zone">
        <form th:action="@{/users/{id}/delete(id=${user.id})}" method="post"
              onsubmit="return confirm('Are you sure you want to permanently delete your account?')">
            <button class="btn-delete-account" type="submit">Delete account</button>
        </form>
    </div>
</div>

<script>
    // Init bio count on load
    const bioArea = document.querySelector('textarea[name="bio"]');
    if (bioArea) {
        document.getElementById('bioCount').textContent = bioArea.value.length + ' / 150';
    }
    function updateBioCount(el) {
        document.getElementById('bioCount').textContent = el.value.length + ' / 150';
    }
</script>
</body>
</html>
