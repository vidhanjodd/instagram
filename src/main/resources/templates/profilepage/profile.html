<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${user.username} + ' • Instagram'">Profile • Instagram</title>
    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />
    <link rel="stylesheet" th:href="@{/css/profile.css}"/>
    <link href="https://fonts.googleapis.com/css2?family=Grand+Hotel&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
<nav>
    <a class="nav-logo" th:href="@{/posts}">Instagram</a>
    <div style="font-size:15px; font-weight:600;" th:text="${user.username}">username</div>
    <div class="nav-icons">
        <a th:href="@{/posts}" title="Home"><i class="fa-solid fa-house"></i></a>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <button type="submit" title="Logout"><i class="fa-solid fa-arrow-right-from-bracket"></i></button>
        </form>
    </div>
</nav>

<div class="page">
    <!-- PROFILE HEADER -->
    <div class="profile-header">
        <div class="profile-avatar-wrap">
            <div class="profile-avatar-ring">
                <div class="profile-avatar-inner"
                     th:text="${#strings.substring(user.username,0,1).toUpperCase()}">A</div>
            </div>
        </div>

        <div class="profile-info">
            <div class="profile-top">
                <span class="profile-username" th:text="${user.username}">username</span>

                <div class="profile-actions" th:if="${currentUser.id == user.id}">
                    <a class="btn-edit" th:href="@{/users/{id}/edit(id=${user.id})}">Edit profile</a>
                    <form th:action="@{/users/{id}/delete(id=${user.id})}"
                          method="post" style="display:inline"
                          onsubmit="return confirm('Delete account?')">
                        <button class="btn-danger" type="submit">Delete account</button>
                    </form>
                </div>

                <div th:if="${currentUser.id != user.id}">
                    <form th:action="@{/users/{id}/follow(id=${user.id})}" method="post" style="display:inline">
                        <button th:if="${isFollowing}" type="submit" class="btn-edit">Following</button>
                        <button th:unless="${isFollowing}" type="submit" class="btn-follow">Follow</button>
                    </form>
                </div>
            </div>

            <div class="profile-stats">
                <div class="stat">
                    <span class="stat-num" th:text="${#lists.size(posts)}">0</span>
                    <span class="stat-label">posts</span>
                </div>
                <a class="stat stat-link" th:href="@{/users/{id}/followers(id=${user.id})}">
                    <span class="stat-num" th:text="${followersCount}">0</span>
                    <span class="stat-label">followers</span>
                </a>
                <a class="stat stat-link" th:href="@{/users/{id}/following(id=${user.id})}">
                    <span class="stat-num" th:text="${followingCount}">0</span>
                    <span class="stat-label">following</span>
                </a>
            </div>

            <div class="profile-bio">
                <div class="display-name" th:text="${user.username}">username</div>
                <div class="bio-text"
                     th:text="${user.bio != null && !#strings.isEmpty(user.bio) ? user.bio : 'No bio yet.'}">Bio here</div>
            </div>
        </div>
    </div>

    <!-- TABS -->
    <div class="profile-tabs">
        <div class="tab active"><i class="fa-solid fa-table-cells"></i> Posts</div>
        <div class="tab"><i class="fa-solid fa-film"></i> Reels</div>
        <div class="tab"><i class="fa-regular fa-id-badge"></i> Tagged</div>
    </div>

    <!-- POSTS GRID -->
    <div class="posts-grid">
        <div th:if="${#lists.isEmpty(posts)}" class="empty-grid">
            <div class="icon"><i class="fa-regular fa-image"></i></div>
            <h3>Share Photos</h3>
            <p>When you share photos, they will appear on your profile.</p>
            <a th:href="@{/posts/create}" class="create-btn">+ Share your first photo</a>
        </div>

        <div class="grid-item"
             th:each="post : ${posts}"
             th:attr="data-post-url=@{/posts/{id}(id=${post.id})}">

            <img th:if="${post.mediaType == 'IMAGE'}"
                 th:src="${post.mediaUrl}"
                 th:alt="${post.caption}"
                 onclick="openPostModal(this.closest('.grid-item'))"/>
            <video th:if="${post.mediaType == 'VIDEO'}"
                   th:src="${post.mediaUrl}"
                   muted
                   onclick="openPostModal(this.closest('.grid-item'))"></video>

            <span th:if="${post.mediaType == 'VIDEO'}" class="video-badge">
                <i class="fa-solid fa-play"></i>
            </span>

            <div class="grid-overlay" onclick="openPostModal(this.closest('.grid-item'))">
                <span class="grid-stat"><i class="fa-solid fa-heart"></i> 0</span>
                <span class="grid-stat"><i class="fa-solid fa-comment"></i> 0</span>
            </div>

            <!-- 3-dot button: only for profile owner -->
            <div class="grid-options-wrap" th:if="${currentUser.id == user.id}"
                 onclick="event.stopPropagation()">
                <button class="grid-dots-btn"
                        th:attr="data-post-id=${post.id}, data-caption=${post.caption}"
                        onclick="toggleGridDropdown(this)">&#8942;</button>
                <div class="grid-dropdown">
                    <button class="grid-dropdown-item grid-edit-btn"
                            th:attr="data-post-id=${post.id}, data-caption=${post.caption}">
                        <i class="fa-regular fa-pen-to-square"></i> Edit Caption
                    </button>
                    <button class="grid-dropdown-item grid-delete-btn"
                            th:attr="data-post-id=${post.id}">
                        <i class="fa-regular fa-trash-can"></i> Delete Post
                    </button>
                </div>
            </div>

        </div>
    </div>
</div>

<!-- POST VIEW MODAL (iframe) -->
<div id="postModal" class="post-modal" onclick="closePostModal(event)">
    <div class="post-modal-content" onclick="event.stopPropagation()">
        <button class="post-modal-close" type="button" onclick="closePostModalDirect()">
            <i class="fa-solid fa-xmark"></i>
        </button>
        <iframe id="postFrame" class="post-frame" src="" frameborder="0"></iframe>
    </div>
</div>

<!-- Delete Confirmation Modal -->
<div class="modal-overlay" id="deleteModal">
    <div class="modal-box" onclick="event.stopPropagation()">
        <div class="modal-title">Delete post?</div>
        <div class="modal-subtitle">Are you sure you want to delete this post?</div>
        <form id="deleteForm" method="post">
            <button type="submit" class="modal-btn modal-delete">Delete</button>
        </form>
        <button class="modal-btn modal-cancel" onclick="closeDeleteModal()">Cancel</button>
    </div>
</div>

<!-- Edit Caption Modal -->
<div class="modal-overlay" id="editModal">
    <div class="modal-box" onclick="event.stopPropagation()">
        <div class="modal-title">Edit Caption</div>
        <div style="padding: 12px 16px 16px;">
            <textarea id="editCaptionInput" rows="4"
                      style="width:100%;box-sizing:border-box;border:1px solid #dbdbdb;border-radius:8px;
                       padding:10px;font-size:14px;resize:none;font-family:'DM Sans',sans-serif;
                       outline:none;color:#262626;"></textarea>
        </div>
        <button class="modal-btn modal-save" id="saveEditBtn">Save</button>
        <button class="modal-btn modal-cancel" onclick="closeEditModal()">Cancel</button>
    </div>
</div>

<script>
    function getCsrfToken()   { return document.querySelector('meta[name="_csrf"]').getAttribute('content'); }
    function getCsrfHeader()  { return document.querySelector('meta[name="_csrf_header"]').getAttribute('content'); }

    /* ── Post iframe modal ───────────────────────────────────────── */
    function openPostModal(element) {
        const postUrl = element.getAttribute('data-post-url');
        const modal   = document.getElementById('postModal');
        document.getElementById('postFrame').src = postUrl;
        modal.classList.add('show');
        document.body.style.overflow = 'hidden';
    }

    function closePostModal(event) {
        if (event.target.id === 'postModal') closePostModalDirect();
    }

    function closePostModalDirect() {
        document.getElementById('postModal').classList.remove('show');
        document.getElementById('postFrame').src = '';
        document.body.style.overflow = 'auto';
    }

    document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') closePostModalDirect();
    });

    /* ── Grid 3-dot dropdown ─────────────────────────────────────── */
    function toggleGridDropdown(btn) {
        document.querySelectorAll('.grid-dropdown.open').forEach(function (d) {
            if (d !== btn.nextElementSibling) d.classList.remove('open');
        });
        btn.nextElementSibling.classList.toggle('open');
    }

    document.addEventListener('click', function (e) {
        if (!e.target.closest('.grid-options-wrap')) {
            document.querySelectorAll('.grid-dropdown.open').forEach(d => d.classList.remove('open'));
        }
    });

    /* ── Wire edit & delete on DOM ready ─────────────────────────── */
    document.addEventListener('DOMContentLoaded', function () {

        document.querySelectorAll('.grid-edit-btn').forEach(function (btn) {
            btn.addEventListener('click', function () {
                document.querySelectorAll('.grid-dropdown.open').forEach(d => d.classList.remove('open'));
                openEditModal(this.dataset.postId, this.dataset.caption || '');
            });
        });

        document.querySelectorAll('.grid-delete-btn').forEach(function (btn) {
            btn.addEventListener('click', function () {
                document.querySelectorAll('.grid-dropdown.open').forEach(d => d.classList.remove('open'));
                openDeleteModal(this.dataset.postId);
            });
        });
    });

    /* ── Delete Modal ────────────────────────────────────────────── */
    function openDeleteModal(postId) {
        const form = document.getElementById('deleteForm');
        form.action = '/posts/' + postId + '/delete';

        const old = form.querySelector('input[name="_csrf"]');
        if (old) old.remove();
        const csrfInput = document.createElement('input');
        csrfInput.type  = 'hidden';
        csrfInput.name  = '_csrf';
        csrfInput.value = getCsrfToken();
        form.appendChild(csrfInput);

        document.getElementById('deleteModal').classList.add('active');
    }

    function closeDeleteModal() {
        document.getElementById('deleteModal').classList.remove('active');
    }

    document.getElementById('deleteModal').addEventListener('click', function (e) {
        if (e.target === this) closeDeleteModal();
    });

    /* ── Edit Modal ──────────────────────────────────────────────── */
    let currentEditPostId = null;

    function openEditModal(postId, caption) {
        currentEditPostId = postId;
        document.getElementById('editCaptionInput').value = caption;
        document.getElementById('editModal').classList.add('active');
        setTimeout(() => document.getElementById('editCaptionInput').focus(), 100);
    }

    function closeEditModal() {
        document.getElementById('editModal').classList.remove('active');
        currentEditPostId = null;
    }

    document.getElementById('editModal').addEventListener('click', function (e) {
        if (e.target === this) closeEditModal();
    });

    document.getElementById('saveEditBtn').addEventListener('click', function () {
        if (!currentEditPostId) return;
        const newCaption = document.getElementById('editCaptionInput').value.trim();
        const btn = this;
        btn.textContent = 'Saving…';
        btn.disabled = true;

        fetch('/posts/' + currentEditPostId + '/edit', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                [getCsrfHeader()]: getCsrfToken()
            },
            body: JSON.stringify({ caption: newCaption })
        })
            .then(function (res) {
                if (res.ok) {
                    // Update stored caption on the edit button so re-opening shows new text
                    const editBtn = document.querySelector('.grid-edit-btn[data-post-id="' + currentEditPostId + '"]');
                    if (editBtn) editBtn.dataset.caption = newCaption;
                    closeEditModal();
                } else {
                    alert('Could not update caption. Please try again.');
                }
            })
            .catch(function () { alert('Network error. Please try again.'); })
            .finally(function () {
                btn.textContent = 'Save';
                btn.disabled = false;
            });
    });
</script>
</body>
</html>
