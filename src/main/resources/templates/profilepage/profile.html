<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${user.username} + ' • Instagram'">Profile • Instagram</title>

    <link rel="stylesheet" th:href="@{/css/profile.css}"/>
    <link href="https://fonts.googleapis.com/css2?family=Grand+Hotel&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

</head>
<body>
<nav>
    <a class="nav-logo" th:href="@{/posts}">Instagram</a>

    <div style="font-size:15px; font-weight:600;" th:text="${user.username}">username</div>

    <div class="nav-icons">
        <a href="/posts/create">
            <i class="fa-solid fa-plus"></i>
        </a>
        <a th:href="@{/posts}" title="Home">
            <i class="fa-solid fa-house"></i>
        </a>

        <form th:action="@{/logout}" method="post" style="display:inline">
            <button type="submit" title="Logout">
                <i class="fa-solid fa-arrow-right-from-bracket"></i>
            </button>
        </form>
    </div>
</nav>

<div class="page">
    <div class="profile-header">
        <div class="profile-avatar-wrap">
            <div class="profile-avatar-ring">
                <div class="profile-avatar-inner">
                    <img th:if="${user.profilePicUrl != null}"
                         th:src="${user.profilePicUrl}"
                         th:alt="${user.username}"/>
                    <span th:unless="${user.profilePicUrl != null}"
                          th:text="${#strings.substring(user.username,0,1).toUpperCase()}">A</span>
                </div>
            </div>
        </div>

        <div class="profile-info">
            <div class="profile-top">
                <span class="profile-username" th:text="${user.username}">username</span>

                <div class="profile-actions" th:if="${currentUser.id == user.id}">
                    <a class="btn-edit" th:href="@{/users/{id}/edit(id=${user.id})}">Edit profile</a>

                    <form th:action="@{/users/{id}/delete(id=${user.id})}"
                          method="post"
                          style="display:inline"
                          onsubmit="return confirm('Delete account?')">
                        <button class="btn-danger" type="submit">Delete account</button>
                    </form>
                </div>

                <div th:if="${currentUser.id != user.id}">
                    <form th:action="@{/users/{id}/follow(id=${user.id})}" method="post" style="display:inline">
                        <button th:if="${isFollowing}" type="submit" class="btn-edit">
                            Following
                        </button>

                        <button th:unless="${isFollowing}" type="submit" class="btn-follow">
                            Follow
                        </button>
                    </form>
                </div>
            </div>

            <div class="profile-stats">
                <div class="stat">
                    <span class="stat-num" th:text="${#lists.size(posts)}">0</span>
                    <span class="stat-label">posts</span>
                </div>

                <a class="stat stat-link" th:href="@{/users/{id}/followers(id=${user.id})}">
                    <span class="stat-num" th:text="${followersCount}">0</span>
                    <span class="stat-label">followers</span>
                </a>

                <a class="stat stat-link" th:href="@{/users/{id}/following(id=${user.id})}">
                    <span class="stat-num" th:text="${followingCount}">0</span>
                    <span class="stat-label">following</span>
                </a>
            </div>

            <div class="profile-bio">
                <div class="display-name" th:text="${user.username}">username</div>
                <div class="bio-text"
                     th:text="${user.bio != null && !#strings.isEmpty(user.bio) ? user.bio : 'No bio yet.'}">
                    Bio here
                </div>
            </div>
        </div>
    </div>

    <div class="profile-tabs">
        <div class="tab active"><i class="fa-solid fa-table-cells"></i> Posts</div>
        <div class="tab"><i class="fa-solid fa-film"></i> Reels</div>
        <div class="tab"><i class="fa-regular fa-id-badge"></i> Tagged</div>
    </div>

    <div class="posts-grid">
        <div th:if="${#lists.isEmpty(posts)}" class="empty-grid">
            <div class="icon"><i class="fa-regular fa-image"></i></div>
            <h3>No Posts Yet</h3>
            <p>This user hasn’t shared any posts.</p>
        </div>

        <div class="grid-item"
             th:each="post : ${posts}"
             th:attr="data-post-url=@{/posts/{id}(id=${post.id})}"
             onclick="openPostModal(this)">

            <div th:if="${!#lists.isEmpty(post.carouselMedia)}">
                <img th:if="${post.carouselMedia[0].mediaType == 'IMAGE'}"
                     th:src="${post.carouselMedia[0].mediaUrl}" th:alt="${post.caption}"/>
                <video th:if="${post.carouselMedia[0].mediaType == 'VIDEO'}"
                       th:src="${post.carouselMedia[0].mediaUrl}" muted></video>
                <span th:if="${post.carouselMedia[0].mediaType == 'VIDEO'}" class="video-badge">
                    <i class="fa-solid fa-play"></i>
                </span>
            </div>

            <div class="grid-overlay">
                <span class="grid-stat"><i class="fa-solid fa-heart"></i>
                    <span th:text="${post.likes != null ? post.likes.size() : 0}">0</span></span>
                <span class="grid-stat"><i class="fa-solid fa-comment"></i>
                    <span th:text="${post.comments != null ? post.comments.size() : 0}">0</span></span>
            </div>
        </div>
    </div>
</div>

<div id="postModal" class="post-modal" onclick="closePostModal(event)">
    <div class="post-modal-content" onclick="event.stopPropagation()">

        <button class="post-modal-close" type="button"
                onclick="closePostModalDirect()" title="Close">
            <i class="fa-solid fa-xmark"></i>
        </button>

        <div class="post-modal-loading" id="postModalLoading">
            <div class="spinner"></div>
        </div>

        <iframe id="postFrame"
                class="post-frame"
                src=""
                onload="hideLoader()"
                title="Post"></iframe>
    </div>
</div>

<script>
    function openPostModal(element) {
        const postUrl = element.getAttribute('data-post-url');

        const modal   = document.getElementById('postModal');
        const frame   = document.getElementById('postFrame');
        const loading = document.getElementById('postModalLoading');

        loading.classList.remove('hidden'); // show spinner first
        frame.src = postUrl;                // trigger iframe load
        modal.classList.add('show');        // show the dark overlay
        document.body.style.overflow = 'hidden'; // prevent background scroll
    }
     function hideLoader() {
        document.getElementById('postModalLoading').classList.add('hidden');
    }
    function closePostModal(event) {
        if (event.target.id === 'postModal') {
            closePostModalDirect();
        }
    }

    function closePostModalDirect() {
        const modal = document.getElementById('postModal');
        const frame = document.getElementById('postFrame');
        const loading = document.getElementById('postModalLoading');


        modal.classList.remove('show');
        frame.src = '';
        loading.classList.remove('hidden');
        document.body.style.overflow = 'auto';
    }

    document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') {
            closePostModalDirect();
        }
    });
</script>
</body>
</html>
