<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Instagram · Sign Up</title>
    <link href="https://fonts.googleapis.com/css2?family=Grand+Hotel&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #000; --surface: #0a0a0a; --border: #2a2a2a;
            --text: #f5f5f5; --muted: #a0a0a0;
            --btn: linear-gradient(45deg, #833ab4, #fd1d1d, #fcb045);
            --input-bg: #121212;
        }
        body {
            background: var(--bg);
            font-family: 'DM Sans', sans-serif;
            color: var(--text);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }
        body::before {
            content: '';
            position: fixed; inset: 0;
            background: radial-gradient(ellipse at 20% 50%, rgba(131,58,180,0.08) 0%, transparent 60%),
            radial-gradient(ellipse at 80% 20%, rgba(253,29,29,0.06) 0%, transparent 50%);
            pointer-events: none;
        }
        .wrapper { width: 100%; max-width: 350px; animation: fadeUp 0.6s ease both; }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 32px 40px;
            margin-bottom: 10px;
            text-align: center;
        }
        .logo {
            font-family: 'Grand Hotel', cursive;
            font-size: 42px;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #833ab4, #fd1d1d, #fcb045);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .tagline {
            font-size: 17px;
            font-weight: 600;
            color: var(--muted);
            margin-bottom: 20px;
            line-height: 1.4;
        }
        .alert {
            background: rgba(225,48,108,0.12);
            border: 1px solid rgba(225,48,108,0.3);
            border-radius: 4px;
            padding: 10px 14px;
            font-size: 13px;
            color: #e1306c;
            margin-bottom: 14px;
        }
        .field {
            position: relative;
            margin-bottom: 6px;
            text-align: left;
        }
        .field input {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 3px;
            padding: 14px 12px 6px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
        }
        .field input:focus { border-color: #555; }
        .field label {
            position: absolute; left: 12px; top: 50%;
            transform: translateY(-50%);
            font-size: 13px; color: var(--muted);
            pointer-events: none;
            transition: all 0.15s ease;
        }
        .field input:focus ~ label,
        .field input:not(:placeholder-shown) ~ label {
            top: 8px; transform: none; font-size: 10px; color: #888;
        }
        .field input::placeholder { color: transparent; }
        .btn-signup {
            width: 100%; padding: 8px; margin-top: 10px;
            background: var(--btn);
            border: none; border-radius: 8px;
            color: #fff; font-family: 'DM Sans', sans-serif;
            font-size: 14px; font-weight: 600; cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }
        .btn-signup:hover { opacity: 0.88; }
        .btn-signup:active { transform: scale(0.98); }
        .terms {
            font-size: 12px; color: var(--muted);
            margin-top: 14px; line-height: 1.5;
        }
        .terms a { color: #a0c4ff; text-decoration: none; }
        .terms a:hover { text-decoration: underline; }
        .divider {
            display: flex; align-items: center; gap: 12px; margin: 18px 0;
        }
        .divider::before, .divider::after {
            content: ''; flex: 1; height: 1px; background: var(--border);
        }
        .divider span { font-size: 12px; font-weight: 600; color: var(--muted); letter-spacing: 1px; }
        .login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 20px;
            text-align: center;
            font-size: 14px; color: var(--muted);
        }
        .login-card a { color: #4fa3e8; font-weight: 600; text-decoration: none; }
        .login-card a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="card">
        <div class="logo">Instagram</div>
        <p class="tagline">Sign up to see photos and videos from your friends.</p>

        <div th:if="${error}" class="alert" th:text="${error}"></div>

        <form th:action="@{/users/register}" method="post" th:object="${user}">
            <div class="field">
                <input type="email" id="email" th:field="*{email}" placeholder="email" required/>
                <label for="email">Email</label>
            </div>
            <div class="field">
                <input type="text" id="username" th:field="*{username}" placeholder="username" required/>
                <label for="username">Username</label>
            </div>
            <div class="field">
                <input type="password" id="password" th:field="*{password}" placeholder="password" required/>
                <label for="password">Password</label>
            </div>
            <button type="submit" class="btn-signup">Sign up</button>
            <p class="terms">
                By signing up, you agree to our <a href="#">Terms</a>,
                <a href="#">Privacy Policy</a> and <a href="#">Cookies Policy</a>.
            </p>
        </form>
    </div>
    <div class="login-card">
        Have an account? <a th:href="@{/login}">Log in</a>
    </div>
</div>
</body>
</html>
