<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Instagram · New Post</title>
    <link href="https://fonts.googleapis.com/css2?family=Grand+Hotel&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #000; --surface: #0a0a0a; --border: #2a2a2a;
            --text: #f5f5f5; --muted: #8e8e8e;
            --btn: linear-gradient(45deg, #833ab4, #fd1d1d, #fcb045);
            --input-bg: #121212;
        }
        body { background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--text); min-height: 100vh; }

        nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            background: rgba(0,0,0,0.92); backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            height: 54px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px;
        }
        .nav-logo {
            font-family: 'Grand Hotel', cursive; font-size: 26px;
            background: linear-gradient(45deg, #833ab4, #fd1d1d, #fcb045);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            text-decoration: none;
        }
        .nav-back { background: none; border: none; color: var(--text); font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; }

        .page { padding: 74px 20px 40px; max-width: 600px; margin: 0 auto; }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            animation: fadeUp 0.4s ease both;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
        }
        .modal-title { font-size: 16px; font-weight: 600; }
        .share-btn {
            background: none; border: none;
            color: #4fa3e8; font-family: 'DM Sans', sans-serif;
            font-size: 14px; font-weight: 600; cursor: pointer;
        }
        .share-btn:hover { color: #fff; }

        /* UPLOAD AREA */
        .upload-area {
            min-height: 300px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 16px; padding: 40px;
            border-bottom: 1px solid var(--border);
            cursor: pointer; position: relative;
            transition: background 0.2s;
        }
        .upload-area:hover { background: rgba(255,255,255,0.02); }
        .upload-area.has-preview { padding: 0; }
        .upload-icon { font-size: 52px; }
        .upload-title { font-size: 20px; font-weight: 300; }
        .upload-subtitle { font-size: 13px; color: var(--muted); }
        .upload-btn {
            background: linear-gradient(45deg, #833ab4, #fd1d1d, #fcb045);
            border: none; border-radius: 8px;
            color: #fff; font-family: 'DM Sans', sans-serif;
            font-size: 14px; font-weight: 600; padding: 8px 20px; cursor: pointer;
        }
        #fileInput { display: none; }

        #preview {
            display: none; width: 100%; max-height: 500px;
            object-fit: cover;
        }
        #previewVideo {
            display: none; width: 100%; max-height: 500px;
            object-fit: cover;
        }

        /* DETAILS */
        .details-section { padding: 16px; border-bottom: 1px solid var(--border); }
        .user-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
        .user-avatar {
            width: 32px; height: 32px; border-radius: 50%;
            background: linear-gradient(45deg, #833ab4, #fd1d1d, #fcb045);
            padding: 1.5px;
        }
        .user-avatar-inner {
            width: 100%; height: 100%; border-radius: 50%;
            background: #1a1a1a; border: 1.5px solid var(--bg);
            display: flex; align-items: center; justify-content: center; font-size: 14px;
        }
        .user-name { font-size: 13px; font-weight: 600; }

        .caption-input {
            width: 100%; background: none; border: none; outline: none;
            color: var(--text); font-family: 'DM Sans', sans-serif;
            font-size: 14px; resize: none; min-height: 80px; line-height: 1.5;
        }
        .caption-input::placeholder { color: var(--muted); }
        .caption-footer {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: 8px;
        }
        .emoji-btn { background: none; border: none; font-size: 18px; cursor: pointer; color: var(--muted); }
        .char-count { font-size: 11px; color: var(--muted); }

        .option-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            cursor: pointer; transition: background 0.15s;
        }
        .option-row:hover { background: rgba(255,255,255,0.03); }
        .option-label { font-size: 14px; }
        .option-arrow { color: var(--muted); font-size: 16px; }

        .alert {
            background: rgba(225,48,108,0.12); border: 1px solid rgba(225,48,108,0.3);
            border-radius: 8px; padding: 12px 16px; font-size: 13px; color: #e1306c;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
<nav>
    <a class="nav-logo" th:href="@{/posts}">Instagram</a>
    <div style="font-size:16px; font-weight:600;">New post</div>
    <a class="nav-back" th:href="@{/posts}">✕</a>
</nav>

<div class="page">
    <div th:if="${error}" class="alert" th:text="${error}"></div>

    <form th:action="@{/posts/create}" method="post" enctype="multipart/form-data" id="postForm">
        <!-- Hidden userId — wire from Spring Security session in production -->
        <input type="hidden" name="userId" th:value="${currentUserId}"/>

        <div class="modal">
            <div class="modal-header">
                <span style="color:var(--muted); font-size:14px;">Crop</span>
                <span class="modal-title">New post</span>
                <button type="submit" class="share-btn">Share</button>
            </div>

            <!-- Upload / Preview Area -->
            <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
                <div class="upload-icon">🏞️</div>
                <div class="upload-title">Drag photos and videos here</div>
                <div class="upload-subtitle">Share moments with your followers</div>
                <button type="button" class="upload-btn" onclick="event.stopPropagation(); document.getElementById('fileInput').click()">
                    Select from computer
                </button>
                <input type="file" id="fileInput" name="file" accept="image/*,video/*" required
                       onchange="handleFile(this)"/>
            </div>
            <img id="preview" alt="preview"/>
            <video id="previewVideo" controls></video>

            <!-- Caption -->
            <div class="details-section">
                <div class="user-row">
                    <div class="user-avatar">
                        <div class="user-avatar-inner">👤</div>
                    </div>
                    <div class="user-name" sec:authentication="name">username</div>
                </div>
                <textarea class="caption-input" name="caption"
                          placeholder="Write a caption…" maxlength="2200"
                          oninput="updateCount(this)"></textarea>
                <div class="caption-footer">
                    <button type="button" class="emoji-btn">😊</button>
                    <span class="char-count" id="charCount">0 / 2200</span>
                </div>
            </div>

            <!-- Options -->
            <div class="option-row">
                <span class="option-label">Add location</span>
                <span class="option-arrow">📍 ›</span>
            </div>
            <div class="option-row">
                <span class="option-label">Tag people</span>
                <span class="option-arrow">🏷 ›</span>
            </div>
            <div class="option-row">
                <span class="option-label">Add music</span>
                <span class="option-arrow">🎵 ›</span>
            </div>
            <div class="option-row" style="border-bottom:none;">
                <span class="option-label">Advanced settings</span>
                <span class="option-arrow">⚙ ›</span>
            </div>
        </div>
    </form>
</div>

<script>
    function handleFile(input) {
        const file = input.files[0];
        if (!file) return;
        const url = URL.createObjectURL(file);
        const area = document.getElementById('uploadArea');
        const img = document.getElementById('preview');
        const vid = document.getElementById('previewVideo');

        area.style.display = 'none';

        if (file.type.startsWith('image/')) {
            img.src = url;
            img.style.display = 'block';
            vid.style.display = 'none';
        } else {
            vid.src = url;
            vid.style.display = 'block';
            img.style.display = 'none';
        }
    }

    function updateCount(el) {
        document.getElementById('charCount').textContent = el.value.length + ' / 2200';
    }
</script>
</body>
</html>
